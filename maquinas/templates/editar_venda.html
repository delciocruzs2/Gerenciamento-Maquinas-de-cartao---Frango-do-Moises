{% extends "base.html" %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'maquinas/css/editar_venda.css' %}">
{% endblock extra_css %}

{% block content %}
<main class="container-editar">
    <div class="card-editar">
        <header class="header-editar">
            <h2 class="format_text">EDITAR LANÇAMENTO</h2>
        </header>

        <form method="post" class="form-edicao">
            {% csrf_token %}
            
            <div class="campo-grupo">
                <span>Comprovante</span>
                {{ form.comprovante }}
            </div>

            <div class="campo-grupo">
                <span>Valor da Venda (R$)</span>
                {{ form.valor_venda }}
            </div>

            <div class="campo-grupo">
                <span>Data da Venda</span>
                {{ form.data_venda }}
            </div>

            <div class="acoes-form">
                <button type="submit" class="btn-confirmar">CONFIRMAR ALTERAÇÃO</button>
                <a href="javascript:history.back()" class="btn-cancelar">CANCELAR</a>
            </div>
        </form>
    </div>
</main>
{% endblock content %}
